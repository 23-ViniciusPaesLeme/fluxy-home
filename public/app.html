<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fluxy Home — Sistema</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  
  <div id="tela-auth" class="fx-auth-wrap">
    <div class="fx-auth">
      <div class="fx-brand fx-brand--auth">
        <span class="fx-logo"><i class="bi bi-wallet2"></i></span>
        <span>Fluxy<b>Home</b></span>
      </div>
      <p class="fx-auth-sub">Organize as finanças da sua casa, mês a mês.</p>

      <div class="fx-tabs">
        <button type="button" class="fx-tab is-on" data-modo="entrar">Entrar</button>
        <button type="button" class="fx-tab" data-modo="criar">Criar conta</button>
      </div>

      <form id="form-auth" class="fx-form" autocomplete="off">
        <div class="fx-field" id="campo-familia" hidden>
          <label for="in-familia">Nome da família</label>
          <input type="text" id="in-familia" placeholder="Ex.: Família Silva" />
        </div>
        <div class="fx-field">
          <label for="in-email">E-mail</label>
          <input type="email" id="in-email" placeholder="voce@email.com" />
        </div>
        <div class="fx-field">
          <label for="in-senha">Senha</label>
          <input type="password" id="in-senha" placeholder="••••••" />
        </div>

        <label class="fx-consent" id="campo-consent" hidden>
          <input type="checkbox" id="in-consent" />
          <span>Li e concordo com a <a href="privacidade.html" target="_blank">Política de Privacidade</a> e autorizo o tratamento dos meus dados conforme a LGPD.</span>
        </label>

        <div id="auth-erro" class="fx-erro" hidden></div>

        <button type="submit" class="btn fx-btn-primary w-100" id="btn-auth">Entrar</button>
        <button type="button" class="btn fx-btn-ghost w-100" id="btn-demo">
          <i class="bi bi-stars"></i> Entrar com conta de demonstração
        </button>
      </form>
      <a href="index.html" class="fx-voltar"><i class="bi bi-arrow-left"></i> Voltar para a página inicial</a>
    </div>
  </div>

  
  <div id="tela-app" class="d-none">
    <header class="fx-header">
      <a href="index.html" class="fx-brand" title="Página inicial">
        <span class="fx-logo"><i class="bi bi-wallet2"></i></span>
        <span>Fluxy<b>Home</b></span>
      </a>
      <div class="fx-mes">
        <button class="fx-mes-btn" id="mes-anterior" aria-label="Mês anterior"><i class="bi bi-chevron-left"></i></button>
        <span class="fx-mes-rotulo" id="mes-rotulo">—</span>
        <button class="fx-mes-btn" id="mes-proximo" aria-label="Próximo mês"><i class="bi bi-chevron-right"></i></button>
      </div>
      <div class="fx-header-dir">
        <span class="fx-familia" id="familia-nome"></span>
        <button class="fx-sair" id="btn-sair" aria-label="Sair"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </header>

    <main class="fx-main" id="conteudo"></main>

    <nav class="fx-nav" id="nav-inferior">
      <button class="fx-nav-item is-on" data-view="painel"><i class="bi bi-grid-1x2"></i><span>Painel</span></button>
      <button class="fx-nav-item" data-view="lancamentos"><i class="bi bi-receipt"></i><span>Lançamentos</span></button>
      <button class="fx-nav-item" data-view="planejamento"><i class="bi bi-bullseye"></i><span>Planejamento</span></button>
      <button class="fx-nav-item" data-view="relatorios"><i class="bi bi-bar-chart"></i><span>Relatórios</span></button>
    </nav>
  </div>

  
  <div class="modal fade" id="modalLancamento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content fx-modal">
        <div class="modal-header border-0">
          <h2 class="modal-title fx-modal-titulo">Novo lançamento</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div class="fx-toggle" role="group" aria-label="Tipo de lançamento">
            <button type="button" class="is-on is-despesa" data-tipo="despesa"><i class="bi bi-arrow-down-circle"></i> Despesa</button>
            <button type="button" data-tipo="receita"><i class="bi bi-arrow-up-circle"></i> Receita</button>
          </div>
          <div class="fx-field">
            <label for="lc-valor">Valor (R$)</label>
            <input type="text" inputmode="decimal" id="lc-valor" placeholder="0,00" />
          </div>
          <div class="fx-field">
            <label for="lc-categoria">Categoria</label>
            <select id="lc-categoria" class="form-select"></select>
          </div>
          <div class="fx-field">
            <label for="lc-descricao">Descrição (opcional)</label>
            <input type="text" id="lc-descricao" placeholder="Ex.: Mercado do mês" />
          </div>
          <div class="fx-field">
            <label for="lc-data">Data</label>
            <input type="date" id="lc-data" />
          </div>
          <div id="lc-erro" class="fx-erro" hidden></div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn fx-btn-ghost" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn fx-btn-primary" id="btn-salvar-lancamento">Salvar lançamento</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
