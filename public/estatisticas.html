<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Estatísticas — Fluxy Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="fx-auth-wrap">

    <!-- Tela de senha -->
    <div class="fx-auth" id="login-box">
      <div class="fx-brand fx-brand--auth">
        <span class="fx-logo"><i class="bi bi-bar-chart"></i></span>
        <span>Fluxy<b>Home</b></span>
      </div>
      <p class="fx-auth-sub">Estatísticas do sistema — acesso restrito.</p>

      <div class="fx-form">
        <div class="fx-field">
          <label for="in-senha">Senha de acesso</label>
          <input type="password" id="in-senha" placeholder="••••••" />
        </div>
        <div id="st-erro" class="fx-erro" hidden></div>
        <button class="btn fx-btn-primary w-100" id="btn-acessar">
          <i class="bi bi-unlock"></i> Acessar estatísticas
        </button>
      </div>
      <a href="index.html" class="fx-voltar"><i class="bi bi-arrow-left"></i> Voltar para a página inicial</a>
    </div>

    <!-- Estatísticas (aparece após a senha correta) -->
    <div class="st-painel" id="stats-box" hidden>
      <div class="st-topo">
        <div class="fx-brand">
          <span class="fx-logo"><i class="bi bi-bar-chart"></i></span>
          <span>Fluxy<b>Home</b></span>
        </div>
        <h1 class="st-titulo">Estatísticas de uso</h1>
        <p class="st-sub">Dados coletados para a documentação do projeto.</p>
      </div>

      <div class="st-grid">
        <div class="st-card">
          <span class="st-card-ico" style="background:#E3F6EE;color:#1FA971"><i class="bi bi-people"></i></span>
          <span class="st-num" id="st-familias">—</span>
          <span class="st-rotulo">Famílias cadastradas</span>
        </div>
        <div class="st-card">
          <span class="st-card-ico" style="background:#EAEAFB;color:#6C6FE0"><i class="bi bi-receipt"></i></span>
          <span class="st-num" id="st-lancamentos">—</span>
          <span class="st-rotulo">Lançamentos registrados</span>
        </div>
        <div class="st-card">
          <span class="st-card-ico" style="background:#FBF0DD;color:#E9A23B"><i class="bi bi-chat-heart"></i></span>
          <span class="st-num" id="st-feedbacks">—</span>
          <span class="st-rotulo">Comentários recebidos</span>
        </div>
        <div class="st-card">
          <span class="st-card-ico" style="background:#FBEAE3;color:#E2613E"><i class="bi bi-star-fill"></i></span>
          <span class="st-num" id="st-nota">—</span>
          <span class="st-rotulo">Nota média</span>
        </div>
      </div>

      <p class="st-data" id="st-data"></p>
      <a href="index.html" class="fx-voltar"><i class="bi bi-arrow-left"></i> Voltar para a página inicial</a>
    </div>

  </div>

  <script src="js/estatisticas.js"></script>
</body>
</html>
